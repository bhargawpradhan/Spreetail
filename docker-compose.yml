services:
  postgres:
    image: postgres:16-alpine
    container_name: splitnest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: splitwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - splitnest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d splitwise"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  splitnest_postgres_data:
